{% extends "base.html" %}

{% block body %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <h1 class="text-center text-3xl font-bold text-indigo-600">{{ site.name }}</h1>
            <h2 class="mt-6 text-center text-2xl font-semibold text-gray-900">Set new password</h2>
        </div>
        
        <div id="alert-container"></div>
        
        <form class="mt-8 space-y-6" x-data="resetPasswordForm()">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="token" value="{{ token }}">
            
            <div class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">New password</label>
                    <input :type="showPassword ? 'text' : 'password'" id="password" name="password" required
                        x-model="form.password"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="••••••••">
                </div>
                
                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirm new password</label>
                    <input :type="showPassword ? 'text' : 'password'" id="confirm_password" name="confirm_password" required
                        x-model="form.confirm_password"
                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="••••••••">
                    <p x-show="form.password !== form.confirm_password && form.confirm_password" class="mt-1 text-sm text-red-600">Passwords do not match</p>
                </div>
            </div>
            
            <div>
                <button type="submit" :disabled="loading || form.password !== form.confirm_password"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50">
                    <span x-text="loading ? 'Resetting...' : 'Reset password'"></span>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function resetPasswordForm() {
    return {
        form: { password: '', confirm_password: '' },
        showPassword: false,
        loading: false,
        
        async handleSubmit(e) {
            e.preventDefault();
            this.loading = true;
            
            try {
                const formData = new FormData(e.target);
                const response = await fetch('/auth/reset-password/' + formData.get('token'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content
                    },
                    body: JSON.stringify({
                        password: this.form.password,
                        confirm_password: this.form.confirm_password
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    this.showAlert('success', 'Password reset! Redirecting to login...');
                    setTimeout(() => window.location.href = '/auth/login', 2000);
                } else {
                    this.showAlert('error', data.error?.message || 'Failed to reset password');
                }
            } catch (error) {
                this.showAlert('error', 'An error occurred');
            } finally {
                this.loading = false;
            }
        },
        
        showAlert(type, message) {
            const container = document.getElementById('alert-container');
            const alertClass = type === 'success' ? 'bg-green-50 border-green-500 text-green-800' : 'bg-red-50 border-red-500 text-red-800';
            container.innerHTML = '<div class="rounded-md border p-4 ' + alertClass + '"><p class="text-sm">' + message + '</p></div>';
        }
    };
}
</script>
{% endblock %}
