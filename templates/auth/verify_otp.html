{% extends "base.html" %}

{% block body %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <h1 class="text-center text-3xl font-bold text-indigo-600">{{ site.name }}</h1>
            <h2 class="mt-6 text-center text-2xl font-semibold text-gray-900">Verify your email</h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Enter the 6-digit code sent to your email.
            </p>
        </div>
        
        <form class="mt-8 space-y-6" method="POST" action="{{ url_for('auth.verify_otp') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="flex justify-center space-x-2">
                <input type="text" name="code_1" maxlength="1" required
                    class="w-12 h-12 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                <input type="text" name="code_2" maxlength="1" required
                    class="w-12 h-12 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                <input type="text" name="code_3" maxlength="1" required
                    class="w-12 h-12 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                <input type="text" name="code_4" maxlength="1" required
                    class="w-12 h-12 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                <input type="text" name="code_5" maxlength="1" required
                    class="w-12 h-12 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                <input type="text" name="code_6" maxlength="1" required
                    class="w-12 h-12 text-center text-2xl border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            
            <div>
                <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Verify
                </button>
            </div>
            
            <div class="text-center">
                <p class="text-sm text-gray-600">
                    Didn't receive the code? <button type="button" class="text-indigo-600 hover:text-indigo-500">Resend</button>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
