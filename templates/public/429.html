{% extends "public/base.html" %}

{% block title %}Rate Limit Exceeded - Viraly{% endblock %}

{% block content %}
<section class="page-header" style="min-height: 80vh; display: flex; align-items: center;">
    <div class="container">
        <div class="animate-on-scroll" style="text-align: center;">
            <div style="font-size: 8rem; font-weight: 800; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;">429</div>
            <h1 style="margin-bottom: var(--space-lg);">Too Many Requests</h1>
            <p style="max-width: 500px; margin: 0 auto var(--space-2xl);">
                You've made too many requests in a short time. Please wait a moment and try again.
            </p>
            <a href="/" class="btn btn-primary btn-lg">Go Home</a>
        </div>
    </div>
</section>
{% endblock %}
