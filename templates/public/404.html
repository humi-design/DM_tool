{% extends "public/base.html" %}

{% block title %}Page Not Found - Viraly{% endblock %}

{% block content %}
<section class="page-header" style="min-height: 80vh; display: flex; align-items: center;">
    <div class="container">
        <div class="animate-on-scroll" style="text-align: center;">
            <div style="font-size: 8rem; font-weight: 800; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;">404</div>
            <h1 style="margin-bottom: var(--space-lg);">Page Not Found</h1>
            <p style="max-width: 500px; margin: 0 auto var(--space-2xl);">
                The page you're looking for doesn't exist or has been moved.
            </p>
            <div class="flex justify-center gap-md" style="flex-wrap: wrap;">
                <a href="/" class="btn btn-primary btn-lg">Go Home</a>
                <a href="/contact" class="btn btn-secondary btn-lg">Contact Us</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
