{% extends "base.html" %}

{% block title %}Leads - {{ site.name }}{% endblock %}

{% block body %}
<div class="min-h-screen bg-gray-100">
    {% include "partials/sidebar.html" %}
    
    <div class="pl-64">
        {% include "partials/topbar.html" %}
        
        <main class="p-6">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-2xl font-bold text-gray-900">Leads</h1>
                <div class="flex space-x-3">
                    <a href="{{ url_for('leads.pipeline') }}" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"></path>
                        </svg>
                        Pipeline View
                    </a>
                    <button class="inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        Add Lead
                    </button>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow">
                <div class="p-6">
                    <p class="text-gray-500 text-center">Leads from your DMs and comments will appear here.</p>
                </div>
            </div>
        </main>
    </div>
</div>
{% endblock %}
