{% extends "base.html" %}

{% block title %}Settings - {{ site.name }}{% endblock %}

{% block body %}
<div class="min-h-screen bg-gray-100">
    {% include "partials/sidebar.html" %}
    
    <div class="pl-64">
        {% include "partials/topbar.html" %}
        
        <main class="p-6">
            <h1 class="text-2xl font-bold text-gray-900 mb-6">Settings</h1>
            
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-1">
                    <nav class="space-y-1">
                        <a href="{{ url_for('settings.profile') }}" class="flex items-center px-4 py-3 text-gray-900 bg-gray-100 rounded-lg">
                            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            Profile
                        </a>
                        <a href="{{ url_for('settings.security') }}" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg">
                            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                            Security
                        </a>
                        <a href="{{ url_for('settings.notifications') }}" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg">
                            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                            </svg>
                            Notifications
                        </a>
                        <a href="{{ url_for('settings.team') }}" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg">
                            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                            </svg>
                            Team
                        </a>
                    </nav>
                </div>
                
                <div class="lg:col-span-3">
                    <div class="bg-white rounded-lg shadow p-6">
                        {% block settings_content %}{% endblock %}
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
{% endblock %}
