{% extends "base.html" %}

{% block title %}DMs - {{ site.name }}{% endblock %}

{% block body %}
<div class="min-h-screen bg-gray-100">
    {% include "partials/sidebar.html" %}
    
    <div class="pl-64">
        {% include "partials/topbar.html" %}
        
        <main class="p-6">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-2xl font-bold text-gray-900">Direct Messages</h1>
                <a href="{{ url_for('dm.compose') }}" class="inline-flex items-center px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    New Message
                </a>
            </div>
            
            <div class="bg-white rounded-lg shadow">
                <div class="p-6">
                    <p class="text-gray-500 text-center">Connect your Instagram account to start managing DMs.</p>
                </div>
            </div>
        </main>
    </div>
</div>
{% endblock %}
