{% extends "public/base.html" %}

{% block title %}Login - Viraly{% endblock %}

{% block extra_head %}
<style>
body.public-page {
    overflow: hidden;
}
</style>
{% endblock %}

{% block content %}
<section class="login-page">
    <div class="login-card animate-on-scroll">
        <div class="login-header">
            <a href="/" class="navbar-logo" style="justify-content: center; margin-bottom: var(--space-lg);">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="40" height="40">
                    <rect width="32" height="32" rx="8" fill="url(#login-logo-gradient)"/>
                    <path d="M10 16L14 20L22 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="login-logo-gradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#7C5CFF"/>
                            <stop offset="1" stop-color="#00CFFF"/>
                        </linearGradient>
                    </defs>
                </svg>
            </a>
            <h1>Welcome back</h1>
            <p>Sign in to continue to Viraly</p>
        </div>
        
        <form class="login-form" action="#" method="POST">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="display: flex; align-items: center; gap: var(--space-sm); color: rgba(255,255,255,0.7); font-size: 0.875rem; cursor: pointer;">
                    <input type="checkbox" style="width: 16px; height: 16px;">
                    Remember me
                </label>
                <a href="#" style="color: var(--primary-light); font-size: 0.875rem;">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Sign In</button>
        </form>
        
        <div class="login-divider">or continue with</div>
        
        <button type="button" class="btn btn-secondary" style="width: 100%; background: white; color: var(--text);">
            <svg viewBox="0 0 24 24" width="20" height="20" style="margin-right: var(--space-sm);">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>
        
        <div class="login-footer">
            Don't have an account? <a href="#">Sign up free</a>
        </div>
    </div>
</section>
{% endblock %}
