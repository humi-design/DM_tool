{% extends "base.html" %}

{% block body %}
<div class="p-6">
    <h1 class="text-2xl font-bold text-gray-900">Quick Actions</h1>
    <p class="mt-2 text-gray-600">Access common actions quickly.</p>
    
    <div class="mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <a href="/dm/compose" class="block p-6 bg-white rounded-lg shadow hover:shadow-md transition">
            <h3 class="font-semibold text-gray-900">New Message</h3>
            <p class="text-sm text-gray-500 mt-1">Send a direct message</p>
        </a>
        <a href="/leads/" class="block p-6 bg-white rounded-lg shadow hover:shadow-md transition">
            <h3 class="font-semibold text-gray-900">View Leads</h3>
            <p class="text-sm text-gray-500 mt-1">Manage your leads</p>
        </a>
        <a href="/instagram/accounts" class="block p-6 bg-white rounded-lg shadow hover:shadow-md transition">
            <h3 class="font-semibold text-gray-900">Instagram</h3>
            <p class="text-sm text-gray-500 mt-1">Manage accounts</p>
        </a>
        <a href="/analytics/" class="block p-6 bg-white rounded-lg shadow hover:shadow-md transition">
            <h3 class="font-semibold text-gray-900">Analytics</h3>
            <p class="text-sm text-gray-500 mt-1">View reports</p>
        </a>
    </div>
</div>
{% endblock %}
