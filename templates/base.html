<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}{{ site.name }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/onboarding.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <div id="app" x-data="{ sidebarOpen: false }">
        {% block body %}{% endblock %}
    </div>
    
    {% block scripts %}{% endblock %}
    <script>
        // Configure htmx to include CSRF token in all requests
        document.body.addEventListener('htmx:configRequest', function(event) {
            event.detail.headers['X-CSRFToken'] = document.querySelector('meta[name="csrf-token"]').content;
        });
        
        // Handle redirects after htmx requests
        document.body.addEventListener('htmx:afterRequest', function(event) {
            // Check for redirect headers
            const redirectUrl = event.detail.xhr.getResponseHeader('X-Htmx-Redirect');
            if (redirectUrl) {
                window.location.href = redirectUrl;
            }
        });
    </script>
</body>
</html>
